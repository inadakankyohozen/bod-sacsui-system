<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BOD採水受付 - 日本環境分析センター</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
  }

  /* ヘッダー */
  .header {
    background: #1a5276;
    color: white;
    padding: 12px 16px;
    text-align: center;
  }
  .header h1 { font-size: 16px; font-weight: bold; }
  .header p  { font-size: 11px; margin-top: 2px; opacity: 0.8; }

  /* メイン */
  .container { padding: 12px; max-width: 480px; margin: 0 auto; }

  /* QRスキャンエリア */
  .scan-area {
    background: white;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    text-align: center;
  }
  .scan-area h2 { font-size: 14px; color: #333; margin-bottom: 12px; }
  #reader {
    width: 100%;
    max-width: 280px;
    margin: 0 auto;
    border-radius: 8px;
    overflow: hidden;
  }
  .scan-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 24px;
    background: #1a5276;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
  }
  .scan-btn:active { background: #154360; }
  .scan-status {
    margin-top: 8px;
    font-size: 12px;
    color: #666;
    min-height: 18px;
  }

  /* QR読取結果 */
  .qr-result {
    background: #eaf4fb;
    border: 1px solid #aed6f1;
    border-radius: 8px;
    padding: 10px 12px;
    margin-top: 10px;
    text-align: left;
    display: none;
  }
  .qr-result h3 { font-size: 12px; color: #1a5276; margin-bottom: 6px; }
  .qr-item { font-size: 13px; color: #333; margin: 3px 0; }
  .qr-item span { font-weight: bold; }

  /* 入力フォーム */
  .form-area {
    background: white;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    display: none;
  }
  .form-area h2 { font-size: 14px; color: #333; margin-bottom: 12px; }

  .form-group { margin-bottom: 12px; }
  .form-group label {
    display: block;
    font-size: 11px;
    color: #666;
    margin-bottom: 4px;
    font-weight: bold;
  }
  .form-group input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    background: #fafafa;
  }
  .form-group input:focus {
    outline: none;
    border-color: #1a5276;
    background: white;
  }
  .form-group input[readonly] {
    background: #eaf4fb;
    color: #1a5276;
    font-weight: bold;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .section-title {
    font-size: 12px;
    color: #1a5276;
    font-weight: bold;
    border-bottom: 1px solid #aed6f1;
    padding-bottom: 4px;
    margin: 14px 0 10px;
  }

  /* 送信ボタン */
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: #1a5276;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 16px;
  }
  .submit-btn:active { background: #154360; }
  .submit-btn:disabled { background: #aaa; }

  /* 完了画面 */
  .success-area {
    background: white;
    border-radius: 12px;
    padding: 32px 16px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    display: none;
  }
  .success-icon { font-size: 48px; margin-bottom: 12px; }
  .success-area h2 { font-size: 18px; color: #1a5276; margin-bottom: 8px; }
  .success-area p  { font-size: 13px; color: #666; margin-bottom: 4px; }
  .next-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 32px;
    background: #1a5276;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <h1>📋 BOD採水受付システム</h1>
  <p>㈱日本環境分析センター</p>
</div>

<div class="container">

  <!-- QRスキャンエリア -->
  <div class="scan-area" id="scanArea">
    <h2>📷 QRコードをスキャンしてください</h2>
    <div id="reader"></div>
    <button class="scan-btn" id="scanBtn" onclick="startScan()">カメラを起動してスキャン</button>
    <div class="scan-status" id="scanStatus">ボタンを押してカメラを起動してください</div>
    <div class="qr-result" id="qrResult">
      <h3>✅ QR読取完了</h3>
      <div class="qr-item">管理番号：<span id="r_kanriNo"></span></div>
      <div class="qr-item">設置場所：<span id="r_setsuchiName"></span></div>
      <div class="qr-item">採水員：<span id="r_saisuiName"></span></div>
      <div class="qr-item">採水業者：<span id="r_tenkenName"></span></div>
    </div>
  </div>

  <!-- 入力フォーム -->
  <div class="form-area" id="formArea">
    <h2>📝 受付情報を入力してください</h2>

    <div class="section-title">QRから自動入力された情報</div>
    <div class="form-group">
      <label>管理番号</label>
      <input type="text" id="kanriNo" readonly>
    </div>
    <div class="form-group">
      <label>設置場所名称</label>
      <input type="text" id="setsuchiName" readonly>
    </div>
    <div class="form-group">
      <label>採水員名</label>
      <input type="text" id="saisuiName" readonly>
    </div>
    <div class="form-group">
      <label>採水業務委託業者名</label>
      <input type="text" id="tenkenName" readonly>
    </div>

    <div class="section-title">手入力項目</div>
    <div class="form-row">
      <div class="form-group">
        <label>採取日</label>
        <input type="date" id="saisuiDate">
      </div>
      <div class="form-group">
        <label>採取時刻</label>
        <input type="time" id="saisuiTime">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>受渡日</label>
        <input type="date" id="watashiDate">
      </div>
      <div class="form-group">
        <label>受渡時刻</label>
        <input type="time" id="watashiTime">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>分析着手日</label>
        <input type="date" id="bunsekiDate">
      </div>
      <div class="form-group">
        <label>分析着手時刻</label>
        <input type="time" id="bunsekiTime">
      </div>
    </div>
    <div class="form-group">
      <label>備考</label>
      <input type="text" id="biko" placeholder="任意">
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitData()">送信する</button>
  </div>

  <!-- 完了画面 -->
  <div class="success-area" id="successArea">
    <div class="success-icon">✅</div>
    <h2>受付完了！</h2>
    <p id="successKanriNo"></p>
    <p id="successSetsuchi"></p>
    <button class="next-btn" onclick="resetForm()">次の検体をスキャン</button>
  </div>

</div>

<!-- Html5-QRCode ライブラリ -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
// GAS WebアプリのURL（デプロイ後に差し替え）
const GAS_URL = 'YOUR_GAS_WEBAPP_URL';

let html5QrCode = null;
let scanning = false;

// QRスキャン開始
function startScan() {
  if (scanning) {
    stopScan();
    return;
  }

  document.getElementById('scanStatus').textContent = 'カメラを起動中...';
  document.getElementById('scanBtn').textContent = '■ スキャンを停止';

  html5QrCode = new Html5Qrcode('reader');
  const config = {
    fps: 10,
    qrbox: { width: 220, height: 220 },
    aspectRatio: 1.0,
  };

  html5QrCode.start(
    { facingMode: 'environment' },  // 背面カメラ
    config,
    onScanSuccess,
    onScanError
  ).catch(err => {
    document.getElementById('scanStatus').textContent = 'カメラの起動に失敗しました: ' + err;
    document.getElementById('scanBtn').textContent = 'カメラを起動してスキャン';
  });

  scanning = true;
}

// スキャン成功
function onScanSuccess(decodedText) {
  stopScan();
  parseQrText(decodedText);
}

// スキャンエラー（無視）
function onScanError(error) {}

// スキャン停止
function stopScan() {
  if (html5QrCode && scanning) {
    html5QrCode.stop().catch(() => {});
    scanning = false;
    document.getElementById('scanBtn').textContent = 'カメラを起動してスキャン';
  }
}

// QRテキストを解析して各フィールドに反映
function parseQrText(text) {
  const data = {};
  text.split('\n').forEach(line => {
    const idx = line.indexOf(':');
    if (idx > 0) {
      const key = line.substring(0, idx).trim();
      const val = line.substring(idx + 1).trim();
      data[key] = val;
    }
  });

  const kanriNo      = data['管理番号'] || '';
  const setsuchiName = data['設置場所'] || '';
  const saisuiName   = data['採水員']   || '';
  const tenkenName   = data['採水業者'] || '';

  // 読取結果を表示
  document.getElementById('r_kanriNo').textContent      = kanriNo;
  document.getElementById('r_setsuchiName').textContent = setsuchiName;
  document.getElementById('r_saisuiName').textContent   = saisuiName;
  document.getElementById('r_tenkenName').textContent   = tenkenName;
  document.getElementById('qrResult').style.display     = 'block';
  document.getElementById('scanStatus').textContent     = '✅ QRコード読取成功！';

  // フォームに反映
  document.getElementById('kanriNo').value      = kanriNo;
  document.getElementById('setsuchiName').value = setsuchiName;
  document.getElementById('saisuiName').value   = saisuiName;
  document.getElementById('tenkenName').value   = tenkenName;

  // 今日の日付をデフォルト設定
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('saisuiDate').value   = today;
  document.getElementById('watashiDate').value  = today;
  document.getElementById('bunsekiDate').value  = today;

  // フォームエリアを表示
  document.getElementById('formArea').style.display = 'block';
  document.getElementById('formArea').scrollIntoView({ behavior: 'smooth' });
}

// データ送信
async function submitData() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  const params = {
    kanriNo:      document.getElementById('kanriNo').value,
    setsuchiName: document.getElementById('setsuchiName').value,
    saisuiName:   document.getElementById('saisuiName').value,
    tenkenName:   document.getElementById('tenkenName').value,
    saisuiDate:   document.getElementById('saisuiDate').value,
    saisuiTime:   document.getElementById('saisuiTime').value,
    watashiDate:  document.getElementById('watashiDate').value,
    watashiTime:  document.getElementById('watashiTime').value,
    bunsekiDate:  document.getElementById('bunsekiDate').value,
    bunsekiTime:  document.getElementById('bunsekiTime').value,
    biko:         document.getElementById('biko').value,
  };

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify(params),
    });
    const json = await res.json();

    if (json.status === 'ok') {
      document.getElementById('successKanriNo').textContent  = '管理番号：' + params.kanriNo;
      document.getElementById('successSetsuchi').textContent = '設置場所：' + params.setsuchiName;
      document.getElementById('scanArea').style.display  = 'none';
      document.getElementById('formArea').style.display  = 'none';
      document.getElementById('successArea').style.display = 'block';
      window.scrollTo(0, 0);
    } else {
      alert('送信エラー：' + json.message);
      btn.disabled = false;
      btn.textContent = '送信する';
    }
  } catch(e) {
    alert('通信エラーが発生しました。\n' + e.message);
    btn.disabled = false;
    btn.textContent = '送信する';
  }
}

// フォームリセット（次の検体へ）
function resetForm() {
  document.getElementById('kanriNo').value      = '';
  document.getElementById('setsuchiName').value = '';
  document.getElementById('saisuiName').value   = '';
  document.getElementById('tenkenName').value   = '';
  document.getElementById('saisuiDate').value   = '';
  document.getElementById('saisuiTime').value   = '';
  document.getElementById('watashiDate').value  = '';
  document.getElementById('watashiTime').value  = '';
  document.getElementById('bunsekiDate').value  = '';
  document.getElementById('bunsekiTime').value  = '';
  document.getElementById('biko').value         = '';
  document.getElementById('qrResult').style.display   = 'none';
  document.getElementById('scanStatus').textContent   = 'ボタンを押してカメラを起動してください';
  document.getElementById('scanBtn').textContent      = 'カメラを起動してスキャン';
  document.getElementById('scanArea').style.display   = 'block';
  document.getElementById('formArea').style.display   = 'none';
  document.getElementById('successArea').style.display = 'none';
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
